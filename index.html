<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модули - Сербский язык</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-10">
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">🇷🇸 Сербский язык</h1>
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold">A1</div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-8 px-4 flex flex-col gap-6">

        <a href="levels.html?module=1" class="block bg-white rounded-3xl p-6 shadow-[0_4px_0_rgb(226,232,240)] active:translate-y-1 active:shadow-none transition-all cursor-pointer border-2 border-transparent hover:border-blue-100">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800">Модуль 1</h2>
                <span class="text-3xl">👋</span>
            </div>
            <h3 class="text-lg font-semibold text-blue-500 mb-2">Добродошли! (Основы)</h3>
            <p class="text-gray-500 text-sm">Вывески, базовая вежливость и фразы-выручалочки.</p>
        </a>

        <a id="module-2" href="#" class="block bg-gray-100 rounded-3xl p-6 shadow-[0_4px_0_rgb(209,213,219)] opacity-75 cursor-not-allowed">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-400">Модуль 2</h2>
                <span class="text-3xl grayscale opacity-50">🏙️</span>
            </div>
            <h3 class="text-lg font-semibold text-gray-400 mb-2">Городская среда</h3>
            <p class="text-gray-400 text-sm">Ориентация в городе, транспорт и направления.</p>
            <div class="mt-4 inline-block bg-gray-200 text-gray-500 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                Пройдите Модуль 1
            </div>
        </a>

    </main>

    <script>
        // Логика разблокировки Модуля 2
        // Проверяем, пройден ли последний (третий) урок первого модуля
        if (localStorage.getItem('lesson3_completed') === 'true') {
            const mod2 = document.getElementById('module-2');

            // Меняем ссылку, чтобы она вела на карту уровней второго модуля
            mod2.href = "levels.html?module=2";

            // Убираем серые классы и добавляем активные
            mod2.classList.remove('bg-gray-100', 'shadow-[0_4px_0_rgb(209,213,219)]', 'opacity-75', 'cursor-not-allowed');
            mod2.classList.add('bg-white', 'shadow-[0_4px_0_rgb(226,232,240)]', 'active:translate-y-1', 'active:shadow-none', 'transition-all', 'cursor-pointer', 'border-2', 'border-transparent', 'hover:border-green-100');

            // Раскрашиваем тексты
            mod2.querySelector('h2').classList.replace('text-gray-400', 'text-gray-800');
            mod2.querySelector('h3').classList.replace('text-gray-400', 'text-green-500');
            mod2.querySelector('p').classList.replace('text-gray-400', 'text-gray-500');
            mod2.querySelector('span').classList.remove('grayscale', 'opacity-50');

            // Убираем плашку "Пройдите Модуль 1"
            const badge = mod2.querySelector('div.mt-4');
            if(badge) badge.remove();
        }
    </script>
</body>
</html>
